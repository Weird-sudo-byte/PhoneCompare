name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install MAUI Workload
        run: dotnet workload install maui-android

      - name: Restore Dependencies
        run: dotnet restore PhoneCompare.csproj

      - name: Build Android APK
        run: dotnet publish PhoneCompare.csproj -f net10.0-android -c Release -p:AndroidPackageFormat=apk --no-restore -o ./artifacts/android

      - name: Rename APK
        run: |
          mkdir -p ./release
          mv ./artifacts/android/com.companyname.phonecompare-Signed.apk ./release/PhoneCompare-Android.apk || \
          mv ./artifacts/android/*.apk ./release/PhoneCompare-Android.apk

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./release/PhoneCompare-Android.apk

  release:
    needs: [build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
