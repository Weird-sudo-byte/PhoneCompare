name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install MAUI Workload
        run: dotnet workload install maui-android

      - name: Restore Dependencies
        run: dotnet restore -f net10.0-android

      - name: Build Android APK
        run: dotnet publish PhoneCompare.csproj -f net10.0-android -c Release -p:AndroidPackageFormat=apk --no-restore -o ./artifacts/android

      - name: Rename APK
        run: |
          mkdir -p ./release
          mv ./artifacts/android/com.companyname.phonecompare-Signed.apk ./release/PhoneCompare-Android.apk || \
          mv ./artifacts/android/*.apk ./release/PhoneCompare-Android.apk

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./release/PhoneCompare-Android.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install MAUI Workload
        run: dotnet workload install maui-windows

      - name: Restore Dependencies
        run: dotnet restore -f net10.0-windows10.0.19041.0

      - name: Build Windows App
        run: dotnet publish PhoneCompare.csproj -f net10.0-windows10.0.19041.0 -c Release --no-restore -o ./artifacts/windows -p:RuntimeIdentifierOverride=win10-x64

      - name: Package Windows App
        run: |
          New-Item -ItemType Directory -Force -Path ./release
          $exe = Get-ChildItem ./artifacts/windows -Recurse -Filter PhoneCompare.exe | Select-Object -First 1
          if ($exe) {
            $sourceDir = $exe.DirectoryName
            Compress-Archive -Path "$sourceDir\*" -DestinationPath ./release/PhoneCompare-Windows.zip -Force
          } else {
            Compress-Archive -Path ./artifacts/windows/* -DestinationPath ./release/PhoneCompare-Windows.zip -Force
          }
        shell: pwsh

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: ./release/PhoneCompare-Windows.zip

  release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./release

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: ./release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
